<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Chawapol Tang</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0 3rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 0.5rem 1.5rem;
            border: 2px solid var(--primary-green);
            background: transparent;
            color: var(--primary-green);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        .filter-btn.active, .filter-btn:hover {
            background: var(--primary-green);
            color: var(--bg-cream);
        }
        .blog-card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 1rem;
        }
        .blog-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .blog-card-date {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .blog-card-excerpt {
            color: var(--text-body);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">CT.</a>
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="blog.html" class="active">Blog</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle dark mode">
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </div>
    </nav>

    <main class="container">
        <section>
            <h1 style="text-align: center;">Writing & Insights</h1>
            <p style="text-align: center; color: var(--text-muted); margin-top: 1rem;">Thoughts on Sustainability, Business, and Growth.</p>

            <div class="filter-container">
                <button class="filter-btn active" onclick="filterBlog('All')">All</button>
                <button class="filter-btn" onclick="filterBlog('Sustainability')">Sustainability</button>
                <button class="filter-btn" onclick="filterBlog('Business')">Business</button>
                <button class="filter-btn" onclick="filterBlog('Self Improvement')">Self Improvement</button>
            </div>

            <div class="grid" id="blog-grid">
                <!-- Posts will be loaded here -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Chawapol Tang. All rights reserved.</p>
    </footer>

    <script src="js/main.js"></script>
    <script>
        let allPosts = [];

        async function loadBlog() {
            try {
                const response = await fetch('content/posts.json');
                allPosts = await response.json();
                renderPosts(allPosts);
            } catch (error) {
                console.error('Error loading blog posts:', error);
            }
        }

        function renderPosts(posts) {
            const grid = document.getElementById('blog-grid');
            grid.innerHTML = posts.map(post => `
                <div class="card">
                    <img src="${post.thumbnail}" alt="${post.title}" class="blog-card-img">
                    <div class="blog-card-meta">
                        <span class="tag">${post.category}</span>
                        <span class="blog-card-date">${new Date(post.date).toLocaleDateString()}</span>
                    </div>
                    <h3>${post.title}</h3>
                    <p class="blog-card-excerpt">${post.excerpt}</p>
                    <a href="post.html?p=${post.slug}" class="btn" style="padding: 0.5rem 1rem; font-size: 0.9rem;">Read More</a>
                </div>
            `).join('');
        }

        function filterBlog(category) {
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === category);
            });

            if (category === 'All') {
                renderPosts(allPosts);
            } else {
                const filtered = allPosts.filter(post => post.category === category);
                renderPosts(filtered);
            }
        }

        window.onload = loadBlog;
    </script>
</body>
</html>
